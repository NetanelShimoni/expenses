services:
  - type: web
    name: expenses-api
    runtime: node
    nodeVersion: "20.18.0"
    buildCommand: npm install && cd local-scrapers && npm install && cd .. && npx puppeteer browsers install chrome
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: Asia/Jerusalem
      - key: SERVER_PORT
        value: "3001"
      - key: ISRACARD_ID
        sync: false
      - key: ISRACARD_CARD6
        sync: false
      - key: ISRACARD_PASSWORD
        sync: false
      - key: CAL_USERNAME
        sync: false
      - key: CAL_PASSWORD
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
